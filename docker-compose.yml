services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MYSQL_HOST=db
      - MYSQL_USER=luxuser
      - MYSQL_PASSWORD=luxpassword
      - MYSQL_DATABASE=luxfinance
      - JWT_SECRET=lux-finance-secure-token-2024
      - GEMINI_API_KEY=your_actual_key_here
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: luxfinance
      MYSQL_USER: luxuser
      MYSQL_PASSWORD: luxpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
